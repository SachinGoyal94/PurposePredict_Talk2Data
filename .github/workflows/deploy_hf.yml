name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  deploy:
    name: Sync Repository with Hugging Face
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # Ensure Large File Storage targets are pulled if applicable

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Replace 'YOUR_HF_USERNAME' and 'YOUR_SPACE_NAME' below with your actual Hugging Face details
          HF_USERNAME: SachinGoyal27
          HF_SPACE_NAME: Talk2Data
        run: |
          git remote add huggingface https://huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          
          # Force push to the Hugging Face Space
          git push --force https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME main

